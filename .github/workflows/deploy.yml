name: Deploy Homepage

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload to EC2
        env:
          SSH_KEY: ${{ secrets.HOST_SSH_KEY }}
          HOST: ${{ secrets.HOST }}
          DEST: ${{ github.ref_name == 'main' && '/home/ec2-user/app/homepage' || '/home/ec2-user/app_new/homepage' }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          COMPOSE_DIR=$([[ "${{ github.ref_name }}" == "main" ]] && echo "/home/ec2-user/deployment-config/production" || echo "/home/ec2-user/deployment-config/staging")

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ec2-user@$HOST "rm -rf $DEST && mkdir -p $DEST"
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r out/. ec2-user@$HOST:$DEST
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ec2-user@$HOST "cd $COMPOSE_DIR && docker-compose restart nginx"

          rm -f /tmp/deploy_key
